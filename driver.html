      ${o.date ? `<div style="font-size:12px;color:var(--t2);margin-top:2px">📅 ${o.date}${o.time ? ', '+o.time : ''}</div>` : ''}
      <div class="status-badge ${o.status === 'confirmed' ? 'status-confirmed' : 'status-taken'}">
        ${o.status === 'confirmed' ? '✅ Підтверджено' : '⏳ Очікує підтвердження адміна'}
      </div>
      ${o.status === 'confirmed' ? `<a href="${tripUrl}" style="display:block;margin-top:10px;width:100%;background:var(--y);color:var(--blk);font-family:Unbounded,sans-serif;font-size:12px;font-weight:700;padding:12px;border-radius:100px;text-align:center;text-decoration:none">🚛 Розпочати поїздку →</a>` : ''}
    </div>
  `}).join('');
}

// ── TAKE ORDER ──
function openDialog(orderId, price) {
  pendingOrderId = orderId;
  document.getElementById('dialogPrice').textContent = price + ' ₴';
  document.getElementById('confirmDialog').classList.add('open');
}

function closeDialog() {
  document.getElementById('confirmDialog').classList.remove('open');
  pendingOrderId = null;
}

async function confirmTake() {
  if (!pendingOrderId) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '...';

  try {
    const orderRef = db.ref('orders/' + pendingOrderId);
    const snap = await orderRef.once('value');
    const order = snap.val();

    if (!order || order.status !== 'new') {
      closeDialog();
      showToast('Замовлення вже взяли 😅');
      btn.disabled = false;
      btn.textContent = 'Підтвердити ✓';
      return;
    }

    await orderRef.update({
      status: 'taken',
      takenBy: currentDriver.id,
      takenByName: currentDriver.name,
      takenAt: Date.now()
    });

    closeDialog();
    showToast('Замовлення твоє! 🎉');
    switchTab('my');

    // notify admin via Telegram
    notifyAdmin(order, currentDriver.name);

  } catch (e) {
    showToast('Помилка. Спробуй ще раз.');
  }
  btn.disabled = false;
  btn.textContent = 'Підтвердити ✓';
}

async function notifyAdmin(order, driverName) {
  const text = `✅ *Замовлення взято!*\n*${order.orderNum}*\n\n🚗 Водій: ${driverName}\n📦 ${order.services}\n🛣️ ${order.from} → ${order.to}\n💰 ${order.driverPay} ₴`;
  try {
    await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text, parse_mode: 'Markdown' })
    });
  } catch (e) {}
}

// ── SOUND ALERT ──
function playAlert() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + delay + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.2);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.3);
    });
  } catch (e) {}
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── AUTO LOGIN (session) ──
const saved = sessionStorage.getItem('bussy_driver');
if (saved) {
  try {
    currentDriver = JSON.parse(saved);
    showMain();
  } catch (e) {}
}

// Check notification on page focus
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && currentDriver) checkNotifPermission();
});
</script>
