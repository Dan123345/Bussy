<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bussy — Генератор оплати</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#ffc900;--yd:#e6b400;--blk:#0f0f0f;--bg:#f7f7f7;--card:#fff;--line:#ebebeb;--t2:#888;--t3:#bbb;--r:20px;--rs:13px}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--blk);max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:40px;-webkit-font-smoothing:antialiased}
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--card);border-radius:var(--r);padding:32px 24px;width:100%;max-width:340px;text-align:center}
.auth-logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:24px;margin-bottom:6px}
.auth-logo em{color:var(--y);font-style:normal}
.auth-sub{font-size:12px;color:var(--t2);margin-bottom:24px}
.auth-inp{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:var(--rs);font-family:'Manrope',sans-serif;font-size:14px;outline:none;background:var(--bg);text-align:center;letter-spacing:3px;margin-bottom:10px}
.auth-inp:focus{border-color:var(--y);background:var(--card)}
.auth-inp.err{border-color:#e74c3c}
.auth-btn{width:100%;background:var(--y);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;padding:14px;border-radius:100px;border:none;cursor:pointer}
nav{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.logo-name{font-family:'Unbounded',sans-serif;font-weight:900;font-size:17px;letter-spacing:-.5px}
.logo-name em{color:var(--y);font-style:normal}
.logo-sub{font-size:10px;color:var(--t2);margin-top:1px}
.admin-badge{font-size:10px;font-weight:700;color:var(--t2);background:var(--bg);padding:4px 10px;border-radius:100px}
.card{background:var(--card);border-radius:var(--r);margin:12px 12px 0;padding:18px}
.card-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--rs);font-family:'Manrope',sans-serif;font-size:14px;outline:none;background:var(--bg);transition:border .2s}
.inp:focus{border-color:var(--y);background:var(--card)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inp-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.btn-gen{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--y);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;padding:16px;border-radius:100px;border:none;cursor:pointer;margin:16px 12px 0;width:calc(100% - 24px);transition:background .15s,transform .15s}
.btn-gen:active{transform:scale(.97);background:var(--yd)}
.result-card{background:var(--card);border-radius:var(--r);margin:12px 12px 0;padding:18px;display:none}
.result-card.vis{display:block}
.result-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px}
.link-box{background:var(--bg);border:1.5px solid var(--line);border-radius:var(--rs);padding:12px 14px;font-size:13px;font-weight:700;color:var(--blk);word-break:break-all;line-height:1.5;margin-bottom:10px;letter-spacing:.3px}
.btn-copy{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--blk);color:#fff;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;padding:14px;border-radius:100px;border:none;cursor:pointer;margin-bottom:8px;transition:background .15s}
.btn-copy:hover{background:#333}
.btn-preview{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--bg);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;padding:14px;border-radius:100px;border:1.5px solid var(--line);cursor:pointer}
.order-meta{background:var(--bg);border-radius:var(--rs);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--t2)}
.order-meta strong{color:var(--blk)}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo">Bu<em>ss</em>y</div>
    <div class="auth-sub">Адмін-панель · Введіть пароль</div>
    <input type="password" class="auth-inp" id="pwdInp" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="auth-btn" onclick="checkPwd()">Увійти</button>
  </div>
</div>

<nav>
  <div>
    <div class="logo-name">Bu<em>ss</em>y</div>
    <div class="logo-sub">генератор оплати</div>
  </div>
  <div class="admin-badge">Адмін</div>
</nav>

<div class="card">
  <div class="card-title">📋 Деталі замовлення</div>

  <div class="inp-row3">
    <div class="field">
      <label>Номер замовлення</label>
      <input class="inp" id="fNum" placeholder="№0000001">
    </div>
    <div class="field">
      <label>Ім'я клієнта</label>
      <input class="inp" id="fName" placeholder="Богдан">
    </div>
    <div class="field">
      <label>Телефон</label>
      <input class="inp" id="fPhone" placeholder="+380...">
    </div>
  </div>

  <div class="field">
    <label>Послуга</label>
    <input class="inp" id="fService" placeholder="Перевезення холодильника та пральної машини">
  </div>

  <div class="inp-row">
    <div class="field">
      <label>Звідки</label>
      <input class="inp" id="fFrom" placeholder="вул. Соборна, 47">
    </div>
    <div class="field">
      <label>Куди</label>
      <input class="inp" id="fTo" placeholder="вул. Київська, 12">
    </div>
  </div>

  <div class="inp-row">
    <div class="field">
      <label>Відстань</label>
      <input class="inp" id="fDist" placeholder="7 км">
    </div>
    <div class="field">
      <label>Дата і час</label>
      <input class="inp" id="fTime" placeholder="27 берез., 10:00">
    </div>
  </div>

  <div class="field">
    <label>Додатково</label>
    <input class="inp" id="fExtras" placeholder="Вантажник 2 год, підйом на 3 поверх">
  </div>

  <div class="field">
    <label>Сума до сплати (₴)</label>
    <input class="inp" id="fTotal" placeholder="1094" type="number">
  </div>
</div>

<button class="btn-gen" onclick="generate()">⚡ Згенерувати посилання</button>

<div class="result-card" id="resultCard">
  <div class="order-meta" id="orderMeta"></div>
  <div class="result-label">Посилання для клієнта</div>
  <div class="link-box" id="linkBox"></div>
  <button class="btn-copy" id="copyBtn" onclick="copyLink()">📋 Скопіювати посилання</button>
  <button class="btn-preview" onclick="openPreview()">👁 Переглянути сторінку</button>
</div>

<script>
const PWD = 'bussy2025';
const BASE = window.location.href.replace('admin.html','payment.html');

function checkPwd(){
  if(document.getElementById('pwdInp').value===PWD){
    document.getElementById('authOverlay').style.display='none';
    sessionStorage.setItem('bussy_auth','1');
  } else {
    const inp=document.getElementById('pwdInp');
    inp.classList.add('err');
    setTimeout(()=>inp.classList.remove('err'),1000);
  }
}
if(sessionStorage.getItem('bussy_auth')==='1') document.getElementById('authOverlay').style.display='none';

let lastLink='';

function generate(){
  const total=document.getElementById('fTotal').value;
  if(!total){document.getElementById('fTotal').focus();return;}

  // Збираємо дані
  const num=document.getElementById('fNum').value.trim()||autoNum();
  const now=new Date();
  const date=now.toLocaleDateString('uk-UA',{day:'numeric',month:'long'})+', '+now.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});

  const data={
    num, date, total,
    name:document.getElementById('fName').value.trim(),
    phone:document.getElementById('fPhone').value.trim(),
    service:document.getElementById('fService').value.trim(),
    from:document.getElementById('fFrom').value.trim(),
    to:document.getElementById('fTo').value.trim(),
    distance:document.getElementById('fDist').value.trim(),
    extras:document.getElementById('fExtras').value.trim(),
    time:document.getElementById('fTime').value.trim(),
  };

  // Зберігаємо в localStorage з коротким ключем
  const key='b'+Date.now().toString(36);
  localStorage.setItem('bussy_order_'+key, JSON.stringify(data));

  lastLink=BASE+'?k='+key;

  document.getElementById('linkBox').textContent=lastLink;
  document.getElementById('orderMeta').innerHTML=
    '<strong>'+num+'</strong> · '+
    (data.name||'—')+
    (data.phone?' · '+data.phone:'')+
    ' · '+total+' ₴';
  document.getElementById('resultCard').classList.add('vis');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

function autoNum(){
  let n=parseInt(localStorage.getItem('bussy_order_counter')||'0')+1;
  localStorage.setItem('bussy_order_counter',n);
  return '№'+String(n).padStart(7,'0');
}

function copyLink(){
  navigator.clipboard.writeText(lastLink).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='✓ Скопійовано!';
    setTimeout(()=>btn.innerHTML='📋 Скопіювати посилання',2000);
  });
}
function openPreview(){window.open(lastLink,'_blank');}
</script>
</body>
</html>
