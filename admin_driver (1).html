<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--y:#ffc900;--yl:#fffaeb;--yd:#e6b400;--blk:#0f0f0f;--bg:#f7f7f7;--card:#fff;--line:#ebebeb;--t2:#888;--r:16px;--rs:12px;--red:#f44336;--green:#00c853}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--blk);-webkit-font-smoothing:antialiased;max-width:500px;margin:0 auto;min-height:100vh}

nav{background:var(--blk);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo-name{font-family:'Unbounded',sans-serif;font-weight:900;font-size:18px;letter-spacing:-.5px;color:#fff}
.logo-name em{color:var(--y);font-style:normal}
.admin-badge{background:var(--y);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:10px;font-weight:900;padding:4px 10px;border-radius:100px;letter-spacing:.3px}

/* LOGIN */
.login-wrap{padding:24px 20px}
.login-card{background:var(--card);border-radius:var(--r);padding:28px 22px;text-align:center}
.login-ico{font-size:48px;margin-bottom:16px}
.login-ttl{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;margin-bottom:8px}
.login-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.pass-inp{width:100%;padding:14px 16px;border:2px solid var(--line);border-radius:var(--rs);font-size:16px;font-family:'Manrope',sans-serif;outline:none;text-align:center;letter-spacing:4px;background:var(--bg);transition:border-color .2s;margin-bottom:12px}
.pass-inp:focus{border-color:var(--y);background:var(--card)}
.pass-inp.err{border-color:var(--red)}
.btn-enter{width:100%;background:var(--y);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;padding:16px;border-radius:100px;border:none;cursor:pointer}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line)}
.tab{flex:1;padding:14px 0;text-align:center;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--blk);border-bottom-color:var(--y)}

.wrap{padding:16px}

/* FORM */
.form-card{background:var(--card);border-radius:var(--r);padding:20px}
.form-ttl{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--rs);font-size:14px;font-family:'Manrope',sans-serif;outline:none;background:var(--bg);transition:border .2s;color:var(--blk)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--y);background:var(--card)}
.field textarea{min-height:70px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.driver-pay-wrap{background:var(--yl);border:2px solid var(--y);border-radius:var(--rs);padding:16px;margin-bottom:14px}
.driver-pay-lbl{font-size:11px;font-weight:700;color:var(--yd);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px}
.driver-pay-inp{width:100%;padding:10px 14px;border:none;border-radius:var(--rs);font-size:22px;font-weight:700;font-family:'Unbounded',sans-serif;outline:none;background:var(--card);color:var(--blk);text-align:center}
.btn-submit{width:100%;background:var(--y);color:var(--blk);font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;padding:17px;border-radius:100px;border:none;cursor:pointer;transition:all .15s;position:relative;margin-top:4px}
.btn-submit:active{background:var(--yd);transform:scale(.98)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.btn-loading::after{content:'';position:absolute;right:18px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--blk);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ORDERS LIST */
.order-row{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border-left:4px solid var(--line);transition:border-color .2s}
.order-row.status-new{border-left-color:var(--y)}
.order-row.status-taken{border-left-color:#4caf50}
.order-row.status-confirmed{border-left-color:#2196f3}
.or-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.or-num{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700}
.or-time{font-size:11px;color:var(--t2)}
.or-route{font-size:13px;font-weight:600;margin-bottom:6px}
.or-meta{font-size:12px;color:var(--t2);margin-bottom:8px}
.or-bottom{display:flex;align-items:center;justify-content:space-between}
.status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px}
.pill-new{background:var(--yl);color:var(--yd)}
.pill-taken{background:#e8f5e9;color:#2e7d32}
.pill-confirmed{background:#e3f2fd;color:#1565c0}
.or-pay{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900}
.or-driver{font-size:12px;color:#2e7d32;font-weight:600}
.action-row{display:flex;gap:8px;margin-top:10px}
.btn-confirm-order{flex:1;background:#e3f2fd;color:#1565c0;border:none;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;padding:9px;border-radius:100px;cursor:pointer}
.btn-delete-order{background:var(--bg);color:var(--t2);border:none;font-size:11px;font-weight:700;padding:9px 14px;border-radius:100px;cursor:pointer;font-family:'Manrope',sans-serif}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--rs);padding:14px;text-align:center}
.stat-num{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--t2);font-weight:600;margin-top:2px}

.empty-state{background:var(--card);border-radius:var(--r);padding:40px 20px;text-align:center}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-ttl{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--t2)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--blk);color:#fff;font-size:13px;font-weight:600;padding:12px 22px;border-radius:100px;z-index:1000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">

      </div>

      <div class="field">
        <label>Відстань</label>
        <input type="text" id="f-distance" placeholder="напр. 12 км">
      </div>

      <div class="field">
        <label>Що везти / Послуга</label>

</div>

<script>
// ══════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDRbyjk3nnbWXgZCcW7PAq_BQcqerY7paE",

  messagingSenderId: "841941953587",
  appId: "1:841941953587:web:c99c94dc971f604960c746"
};

const ADMIN_PASSWORD = 'bussy2025'; // Зміни на свій!
const TG_TOKEN = '8782277242:AAH6fNfjqO9M5PbbrdGTqA_PlkynXaJJEsg';
const ADMIN_CHAT_ID = '438820953';
// ══════════════════════════════════════════

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// ── LOGIN ──
function doAdminLogin() {
  const pass = document.getElementById('passInp').value;
  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('bussy_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';

    // set today's date as default
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  } else {

    setTimeout(() => { document.getElementById('passInp').classList.remove('err'); document.getElementById('passInp').value = ''; }, 1000);
  }
}
document.getElementById('passInp').addEventListener('keydown', e => { if (e.key === 'Enter') doAdminLogin(); });

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-create').classList.toggle('on', tab === 'create');
  document.getElementById('tab-orders').classList.toggle('on', tab === 'orders');
  document.getElementById('createTab').style.display = tab === 'create' ? 'block' : 'none';
  document.getElementById('ordersTab').style.display = tab === 'orders' ? 'block' : 'none';
}

// ── ORDER NUMBER ──
function genOrderNum() {
  const key = 'bussy_order_counter';
  let n = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, n);
  return '№' + String(n).padStart(7, '0');
}

// ── CREATE ORDER ──
async function createOrder() {
  const manualNum = document.getElementById('f-orderNum')?.value.trim().replace(/[^a-zA-Z0-9\-_]/g,'');
  const from = document.getElementById('f-from').value.trim();
  const to = document.getElementById('f-to').value.trim();
  const driverPay = document.getElementById('f-driverPay').value.trim();

  if (!from || !to || !driverPay) {
    showToast('Заповни: Звідки, Куди, Сума для водія');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.classList.add('btn-loading');
  btn.disabled = true;

  const rawNum = document.getElementById('f-orderNum').value.trim();
  const orderNum = rawNum.replace(/[^a-zA-Z0-9\-_]/g,'').slice(0,30) || genOrderNum();
  const dateVal = document.getElementById('f-date').value;
  const timeVal = document.getElementById('f-time').value;

  const order = {
    orderNum,
    from,
    to,
    distance: document.getElementById('f-distance').value.trim() || null,
    services: document.getElementById('f-services').value.trim() || null,
    extras: document.getElementById('f-extras').value.trim() || null,
    date: dateVal ? formatDate(dateVal) : null,
    time: timeVal || null,
    driverPay: parseInt(driverPay),
    status: 'new',
    createdAt: Date.now()
  };

  try {
    await db.ref('orders').push(order);
    showToast('Замовлення відправлено водіям! 🚛');
    clearForm();
    notifyAdmin(order);
  } catch (e) {
    showToast('Помилка. Перевір Firebase.');
  }

  btn.classList.remove('btn-loading');
  btn.disabled = false;
}

function formatDate(iso) {
  const d = new Date(iso);
  const months = ['січ', 'лют', 'бер', 'квіт', 'трав', 'черв', 'лип', 'серп', 'вер', 'жовт', 'лист', 'груд'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function clearForm() {
  ['f-orderNum', 'f-from', 'f-to', 'f-distance', 'f-services', 'f-extras', 'f-driverPay'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-time').value = '';
}

// ── LOAD ORDERS ──
// Sound for admin on status changes
let adminKnownStatuses = {};
function playAdminSound(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const freqs = type==='taken'?[660,880]:type==='confirmed'?[440,550,660]:[880];
    freqs.forEach((f,i) => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.15);
      g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.15+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.15+0.2);
      o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.3);
    });
  } catch(e) {}
}

function loadOrders() {
  db.ref('orders').orderByChild('createdAt').on('value', snap => {
    const data = snap.val() || {};
    const entries = Object.entries(data).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));
    checkStatusChanges(entries);
    renderStats(entries);
    renderOrders(entries);
  });
}

function checkStatusChanges(entries) {
  entries.forEach(([id, o]) => {
    const prev = adminKnownStatuses[id];
    if(prev && prev !== o.status) {
      if(o.status==='taken') { playAdminSound('taken'); showToast('🚗 ' + (o.takenByName||'Водій') + ' взяв замовлення!'); }
      else if(o.status==='confirmed') playAdminSound('confirmed');
      else if(o.status==='done') { playAdminSound('done'); showToast('✅ Замовлення виконано!'); }
    }
    adminKnownStatuses[id] = o.status;
  });
}

function renderStats(entries) {
  const total = entries.length;
  const newCount = entries.filter(([, o]) => o.status === 'new').length;
  const takenCount = entries.filter(([, o]) => o.status === 'taken' || o.status === 'confirmed').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Всього</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--yd)">${newCount}</div><div class="stat-lbl">Очікують</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#2e7d32">${takenCount}</div><div class="stat-lbl">Взяті</div></div>
  `;
}

function renderOrders(entries) {
  const list = document.getElementById('ordersList');
  if (!entries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-ico">📭</div><div class="empty-ttl">Замовлень немає</div><div class="empty-sub">Створи перше замовлення</div></div>`;
    return;
  }
  list.innerHTML = entries.map(([id, o]) => {
    const statusMap = { new: ['pill-new', '⏳ Нове'], taken: ['pill-taken', '🤝 Взяте'], confirmed: ['pill-confirmed', '✅ Підтверджено'] };
    const [pillClass, pillText] = statusMap[o.status] || ['pill-new', o.status];
    const time = o.createdAt ? new Date(o.createdAt).toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
    return `
    <div class="order-row status-${o.status}">
      <div class="or-top">
        <div>
          <div class="or-num">${o.orderNum || id}</div>
          <div class="or-time">${time}</div>
        </div>
        <div class="or-pay">${o.driverPay} ₴</div>
      </div>
      <div class="or-route">${o.from} → ${o.to}</div>
      ${o.services ? `<div class="or-meta">${o.services}${o.distance ? ' · ' + o.distance : ''}</div>` : ''}
      ${o.date ? `<div class="or-meta">📅 ${o.date}${o.time ? ', ' + o.time : ''}</div>` : ''}
      <div class="or-bottom">
        <span class="status-pill ${pillClass}">${pillText}</span>
        ${o.takenByName ? `<span class="or-driver">🚗 ${o.takenByName}</span>` : ''}
      </div>
      <div class="action-row">
        ${o.status === 'taken' ? `<button class="btn-confirm-order" onclick="confirmOrder('${id}')">✅ Підтвердити</button>` : ''}
        ${o.status === 'confirmed' ? `<button class="btn-confirm-order" style="background:#e8f5e9;color:#2e7d32" onclick="(function(){const num='${(o.orderNum||id).replace(/[^a-zA-Z0-9\-_]/g,'')}';showLinkModal(${JSON.stringify({takenByName:o.takenByName||'',orderNum:o.orderNum||id}).replace(/"/g,"'")},num,'https://bussy.mobi/trip.html?order='+num+'&view=client','https://bussy.mobi/trip.html?order='+num+'&view=driver')})()">🔗 Посилання</button>` : ''}
        ${o.status!=='done'?`<button class="btn-delete-order" onclick="deleteOrder('${id}')">🗑 Видалити</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function confirmOrder(id) {
  const snap = await db.ref('orders/' + id).once('value');
  const o = snap.val() || {};
  showConfirmModal(id, o);
}

function showConfirmModal(id, o) {
  const ex = document.getElementById('confirmModal');
  if(ex) ex.remove();
  const orderNum = (o.orderNum||id).replace(/[^a-zA-Z0-9\-_]/g,'');
  const clientUrl = 'https://bussy.mobi/trip.html?order=' + orderNum + '&view=client';
  const m = document.createElement('div');
  m.id = 'confirmModal';
  m.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center';
  m.innerHTML = `
    <div style="background:#fff;border-radius:24px 24px 0 0;padding:28px 22px 40px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto">
      <div style="width:40px;height:4px;background:#ebebeb;border-radius:2px;margin:0 auto 20px"></div>
      <div style="font-family:Unbounded,sans-serif;font-size:15px;font-weight:900;margin-bottom:4px">Підтвердити замовлення</div>
      <div style="font-size:13px;color:#888;margin-bottom:18px">Водій: <b>${o.takenByName||'—'}</b> · <b>${o.orderNum||id}</b></div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px">Ім'я клієнта</label>
        <input id="cm-name" type="text" placeholder="Олена Марченко" style="width:100%;padding:12px 14px;border:1.5px solid #ebebeb;border-radius:12px;font-size:14px;font-family:Manrope,sans-serif;outline:none;background:#f7f7f7">
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px">Телефон клієнта</label>
        <input id="cm-phone" type="tel" placeholder="+380..." style="width:100%;padding:12px 14px;border:1.5px solid #ebebeb;border-radius:12px;font-size:14px;font-family:Manrope,sans-serif;outline:none;background:#f7f7f7">
      </div>
      <button id="cm-submit-btn" onclick="doConfirmOrder('${id}')" style="width:100%;background:#ffc900;color:#0f0f0f;font-family:Unbounded,sans-serif;font-size:14px;font-weight:700;padding:16px;border-radius:100px;border:none;cursor:pointer;margin-bottom:14px">✅ Підтвердити і надіслати водію</button>
      <div style="background:#f0f4ff;border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:700;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px">Посилання для клієнта</div>
        <div style="font-size:12px;color:#333;word-break:break-all;margin-bottom:8px">${clientUrl}</div>
        <button onclick="navigator.clipboard.writeText('${clientUrl}').then(()=>showToast('Скопійовано!'))" style="width:100%;background:#0f0f0f;color:#ffc900;font-family:Unbounded,sans-serif;font-size:12px;font-weight:700;padding:10px;border-radius:100px;border:none;cursor:pointer">Копіювати посилання клієнту</button>
      </div>
      <button onclick="document.getElementById('confirmModal').remove()" style="width:100%;background:#f7f7f7;color:#0f0f0f;font-family:Manrope,sans-serif;font-size:13px;font-weight:600;padding:13px;border-radius:100px;border:none;cursor:pointer">Закрити</button>
    </div>
  `;
  document.body.appendChild(m);
  m.addEventListener('click', e => { if(e.target===m) m.remove(); });
}

async function doConfirmOrder(id) {
  const clientName = document.getElementById('cm-name')?.value.trim() || '';
  const clientPhone = document.getElementById('cm-phone')?.value.trim() || '';
  const btn = document.getElementById('cm-submit-btn');
  if(btn){ btn.textContent = '...'; btn.disabled = true; }
  const snap = await db.ref('orders/'+id).once('value');
  const o = snap.val()||{};
  const orderNum = (o.orderNum||id).replace(/[^a-zA-Z0-9\-_]/g,'');
  await db.ref('orders/'+id).update({ status:'confirmed', clientName, clientPhone, confirmedAt:Date.now() });
  // Write to trips node for trip.html
  await db.ref('trips/'+orderNum).update({
    phase:'idle',
    orderData:{
      orderNumber:orderNum,clientName,clientPhone,
      driverName:o.takenByName||'',
      service:o.services||'',
      from:o.from||'',to:o.to||'',
      distance:o.distance||'',
      datetime:o.date?(o.date+(o.time?', '+o.time:'')):'',
      notes:o.extras||'',amount:''
    }
  });
  showToast('✅ Підтверджено! Дані надіслано водію');
  document.getElementById('confirmModal')?.remove();
}

async function deleteOrder(id) {
  if (confirm('Видалити замовлення?')) {
    await db.ref('orders/' + id).remove();
    showToast('Видалено');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
